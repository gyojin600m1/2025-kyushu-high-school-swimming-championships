    const surname=name=>{const s=String(name||'').trim();if(!s)return '';if(/\s/.test(s))return s.split(/\s+/)[0];return Object.keys(SURNAME_READINGS).sort((a,b)=>b.length-a.length).find(k=>s.startsWith(k))||s.slice(0,2)}; const searchNorm=v=>norm(v).replace(/m/g,'').replace(/[×x]/g,''); const cleanName=name=>String(name||'').trim().replace(/\s+/g,' '); const readingForName=name=>NAME_READINGS[cleanName(name)]||NAME_READINGS[normalizeChars(cleanName(name))]||''; const personKey=(gender,name,school)=>`${gender}__${norm(cleanName(name))}__${school}`; const nameSearchText=r=>{const people=r.isRelay?(r.relayMembers||[]):[r.name];return people.map(n=>`${n} ${readingForName(n)} ${surname(n)} ${SURNAME_READINGS[surname(n)]||''}`).join(' ')}; const eventSearchText=r=>`${r.gender} ${r.event} ${r.round}`; const isTimeFinalGroup=rows=>rows.some(r=>r.round==='タイム決勝'||r.divisionCode===2||/800m|1500m/.test(r.event))||!RESULTS.some(r=>r.gender===rows[0].gender&&r.event===rows[0].event&&r.round==='予選');
    function participantRows(rows,matchQuery=false){const q=norm(state.q);const eq=searchNorm(state.q);const out=[];rows.forEach(r=>{const people=r.isRelay?(r.relayMembers||[]):[r.name];people.forEach(raw=>{const name=cleanName(raw);if(!name)return;if(matchQuery&&q){const personText=`${name} ${readingForName(name)} ${surname(name)} ${SURNAME_READINGS[surname(name)]||''}`;if(!norm(personText).includes(q)&&!searchNorm(eventSearchText(r)).includes(eq))return}out.push({...r,name,personKey:personKey(r.gender,name,r.school),relayTeam:r.isRelay?r.name:'',fromRelayMember:!!r.isRelay})})});return out}
    function init(){renderStats();setupFilters();setupChips();bind();render()}
    function renderStats(){const schools=unique(RESULTS.map(r=>r.school)); const people=participantRows(RESULTS); const personKeys=unique(people.map(p=>p.personKey)); const boys=unique(people.filter(p=>p.gender==='男子').map(p=>p.personKey)).length; const girls=unique(people.filter(p=>p.gender==='女子').map(p=>p.personKey)).length; $('stats').innerHTML=[['出場選手',personKeys.length],['男子',boys],['女子',girls],['参加校',schools.length]].map(([label,num])=>`<div class="stat"><div class="num">${num}</div><div class="label">${label}</div></div>`).join('')}
    function setupFilters(){fillSelect('gender',[['all','男女すべて'],['男子','男子'],['女子','女子']]);fillSelect('school',[['all','全学校'],...unique(RESULTS.map(r=>r.school)).sort((a,b)=>a.localeCompare(b,'ja')).map(v=>[v,v])]);const events=OFFICIAL_EVENTS.map(([gender,event])=>[`${gender}__${event}`,`${gender} ${event}`]);fillSelect('event',[['all','全種目'],...events]);fillSelect('round',[['all','予選・決勝'],['予選','予選'],['決勝','決勝']]);fillSelect('sort',[['event','種目ごと'],['rank','順位順'],['time','タイム順'],['school','学校順']])}
    function fillSelect(id,rows){$(id).innerHTML=rows.map(([value,label])=>`<option value="${esc(value)}">${esc(label)}</option>`).join('')}
    function setupChips(){const schoolCounts=new Map();RESULTS.forEach(r=>schoolCounts.set(r.school,(schoolCounts.get(r.school)||0)+1));const schools=[...schoolCounts.entries()].sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0],'ja')).map(([s])=>s);$('chips').innerHTML=schools.map(c=>`<button class="chip" data-chip="${esc(c)}" type="button">${esc(c)}</button>`).join('')}
    function bind(){$('q').addEventListener('input',e=>{state.q=e.target.value;render()});$('clear').addEventListener('click',()=>{state.q='';$('q').value='';render()});['gender','school','round','event','sort'].forEach(id=>$(id).addEventListener('change',e=>{state[id]=e.target.value;if(id==='school')state.chip=e.target.value==='all'?'':e.target.value;syncChips();render()}));document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{state.view=btn.dataset.view;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b===btn));['results','athletes','schools'].forEach(v=>$(`view-${v}`).classList.toggle('hidden',v!==state.view));render()}));$('chips').addEventListener('click',e=>{const btn=e.target.closest('[data-chip]');if(!btn)return;const next=btn.dataset.chip;state.chip=state.chip===next?'':next;state.school=state.chip||'all';$('school').value=state.school;syncChips();render()});$('schoolsList').addEventListener('click',e=>{const card=e.target.closest('[data-school-card]');if(!card)return;state.selectedSchool=state.selectedSchool===card.dataset.school?'':card.dataset.school;renderSchools(RESULTS)})}
    function syncChips(){document.querySelectorAll('.chip').forEach(ch=>ch.classList.toggle('active',ch.dataset.chip===state.chip))}
    function filteredResults(){const q=norm(state.q);const eq=searchNorm(state.q);return RESULTS.filter(r=>{if(state.gender!=='all'&&r.gender!==state.gender)return false;if(state.school!=='all'&&r.school!==state.school)return false;if(state.round!=='all'&&r.round!==state.round)return false;if(state.event!=='all'&&eventKey(r)!==state.event)return false;if(!q)return true;return norm(nameSearchText(r)).includes(q)||searchNorm(eventSearchText(r)).includes(eq)}).sort(sorter)}
    function sorter(a,b){if(state.sort==='time')return timeToSec(a.time)-timeToSec(b.time);if(state.sort==='event')return `${a.gender}${a.event}${a.round}${a.heat}${a.rank}`.localeCompare(`${b.gender}${b.event}${b.round}${b.heat}${b.rank}`,'ja');if(state.sort==='school')return `${a.school}${genderOrder(a.gender)}${-gradeNum(a.grade)}${a.name}`.localeCompare(`${b.school}${genderOrder(b.gender)}${-gradeNum(b.grade)}${b.name}`,'ja');return(rankNum(a.rank)-rankNum(b.rank))||timeToSec(a.time)-timeToSec(b.time)||(a.lane||999)-(b.lane||999)}
    function render(){const rows=filteredResults();if(state.view==='results')renderResults(rows);if(state.view==='athletes')renderAthletes(rows);if(state.view==='schools')renderSchools(RESULTS)}
    function renderResults(rows){$('resultCount').textContent=`${rows.length}件`;$('resultsList').innerHTML=rows.length?resultGroups(rows):`<div class="empty">この条件の結果データはまだ入っていません</div>`}
    function resultGroups(rows){const groups=new Map();rows.forEach(r=>{const timeLike=r.round==='タイム決勝'||r.divisionCode===2||/800m|1500m/.test(r.event);const key=`${r.gender}__${r.event}__${r.round}__${timeLike?0:(r.round==='予選'?r.heat:0)}`;if(!groups.has(key))groups.set(key,[]);groups.get(key).push(r)});return [...groups.values()].sort((a,b)=>`${a[0].gender}${a[0].event}${a[0].round}${a[0].heat}`.localeCompare(`${b[0].gender}${b[0].event}${b[0].round}${b[0].heat}`,'ja')).map(group=>{const sorted=group.slice().sort((a,b)=>rankNum(a.rank)-rankNum(b.rank)||timeToSec(a.time)-timeToSec(b.time)||(a.lane||999)-(b.lane||999));const timeFinal=isTimeFinalGroup(sorted);const visible=(timeFinal||state.q)?sorted:sorted.filter(r=>r.rank<=8);const heats=unique(sorted.map(r=>r.heat));const label=timeFinal&&heats.length>1?`${sorted[0].round} 全組`:roundLabel(sorted[0].round,sorted[0].heat);const note=timeFinal?'タイム決勝は全員を順位順に表示':`${Math.min(8,visible.length)}位まで表示`;return `<section class="result-group"><div class="group-head"><div class="group-title">${esc(eventLabel(sorted[0]))} / ${esc(label)}</div><div class="group-note">${esc(note)} / ${visible.length}件</div></div>${visible.map(resultCard).join('')}</section>`}).join('')}
    function resultCard(r){const gcls=r.gender==='女子'?'female':'male';const status=r.status?badge(r.status,/^q$/i.test(r.status)?'q':'record'):'';return `<article class="result-card"><div class="rankbox"><div><div class="rank">${rankText(r.rank)}</div><div class="lane">Lane ${esc(r.lane)}</div></div></div><div><div class="main-name">${esc(r.name)} ${badge(r.gender,gcls)} ${status}</div><div class="meta">${esc(r.grade || (r.isRelay?'リレー':'－'))} / ${esc(r.school)}</div><div class="eventline">${esc(r.event)} / ${esc(roundLabel(r.round,r.heat))}${r.relayMembers&&r.relayMembers.length?` / ${esc(r.relayMembers.join('・'))}`:''}</div></div><div class="timebox"><span class="badge">${esc(r.round)}</span><div class="time">${esc(r.time)}</div></div></article>`}
    function renderAthletes(rows){const map=new Map();participantRows(rows,true).forEach(r=>{if(!map.has(r.personKey))map.set(r.personKey,[]);map.get(r.personKey).push(r)});const athletes=[...map.values()].sort((a,b)=>genderOrder(a[0].gender)-genderOrder(b[0].gender)||gradeNum(b[0].grade)-gradeNum(a[0].grade)||a[0].name.localeCompare(b[0].name,'ja'));$('athleteCount').textContent=`${athletes.length}人`;$('athletesList').innerHTML=athletes.length?athletes.map(athleteCard).join(''):`<div class="empty">該当する選手がありません</div>`}
    function athleteCard(races){races.sort((a,b)=>`${a.gender}${a.event}${a.round}`.localeCompare(`${b.gender}${b.event}${b.round}`,'ja')||rankNum(a.rank)-rankNum(b.rank));const r=races[0];const bestRank=Math.min(...races.map(x=>rankNum(x.rank))); const bestRankLabel=bestRank===9999?'記録なし':`${bestRank}位`;const bestTime=races.reduce((best,cur)=>timeToSec(cur.time)<timeToSec(best.time)?cur:best,races[0]);const grade=r.grade || (races.some(x=>x.fromRelayMember)?'リレー出場':'－');return `<article class="athlete-card"><div class="card-top"><div><div class="card-title">${esc(r.name)}</div><div class="meta">${esc(grade)} / ${esc(r.school)}</div></div>${badge(r.gender,r.gender==='女子'?'female':'male')}</div><div class="summary-row">${badge(`最高 ${bestRankLabel}`)}${badge(`最速 ${bestTime.time||'-'}`)}${badge(`${races.length}件`)}</div><div>${races.map(x=>`<div class="race-row"><div><div class="race-name">${esc(x.event)}</div><div class="race-sub">${esc(roundLabel(x.round,x.heat))} / ${esc(x.lane)}レーン${x.fromRelayMember?` / ${esc(x.relayTeam)}`:''}</div></div><div class="timebox"><div class="time">${esc(x.time)}</div><div class="meta">${rankText(x.rank)}</div></div></div>`).join('')}</div></article>`}
    function renderSchools(rows){const map=new Map();rows.forEach(r=>{if(!map.has(r.school))map.set(r.school,[]);map.get(r.school).push(r)});const schools=[...map.values()].sort((a,b)=>schoolPoints(b)-schoolPoints(a)||schoolParticipantGroups(b).length-schoolParticipantGroups(a).length||a[0].school.localeCompare(b[0].school,'ja'));$('schoolCount').textContent=`${schools.length}校`;$('schoolsList').innerHTML=schools.length?schools.map(schoolBlock).join(''):`<div class="empty">該当する学校がありません</div>`}
    function schoolPoints(races){return races.filter(r=>r.round==='決勝').reduce((sum,r)=>sum+points(r.rank,r.event),0)}
    function schoolParticipantGroups(races){const map=new Map();participantRows(races,false).forEach(r=>{if(!map.has(r.personKey))map.set(r.personKey,[]);map.get(r.personKey).push(r)});return [...map.values()].sort((a,b)=>genderOrder(a[0].gender)-genderOrder(b[0].gender)||gradeNum(b[0].grade)-gradeNum(a[0].grade)||a[0].name.localeCompare(b[0].name,'ja'))}
    function schoolBlock(races){const school=races[0].school;return schoolCard(races)+(state.selectedSchool===school?schoolRoster(school,races):'')}
    function schoolCard(races){const school=races[0].school;const total=schoolPoints(races);const finalists=races.filter(r=>r.round==='決勝').length;const people=schoolParticipantGroups(races);const active=state.selectedSchool===school?' active':'';return `<article class="school-card${active}" data-school-card="${esc(school)}"><div class="card-top"><div><div class="card-title">${esc(school)}</div><div class="meta">選手 ${people.length}人 / 結果 ${races.length}件 / 決勝 ${finalists}件</div></div><div class="points">${total}点</div></div><div class="summary-row">${badge('タップで全選手')}${badge(`${people.length}人`)}</div></article>`}
    function schoolRoster(school,races){const athletes=schoolParticipantGroups(races);return `<section class="school-roster"><div class="group-head"><div class="group-title">${esc(school)} 全選手</div><div class="group-note">${athletes.length}人</div></div>${athletes.map(studentRow).join('')}</section>`}
    function studentRow(races){races.sort((a,b)=>`${a.gender}${a.event}${a.round}`.localeCompare(`${b.gender}${b.event}${b.round}`,'ja')||rankNum(a.rank)-rankNum(b.rank));const r=races.find(x=>!x.fromRelayMember&&x.grade)||races[0];const grade=r.grade||(races.some(x=>x.fromRelayMember)?'リレー出場':'－');const bestRank=Math.min(...races.map(x=>rankNum(x.rank)));const bestRankLabel=bestRank===9999?'記録なし':`${bestRank}位`;const events=unique(races.map(x=>`${x.event} ${x.round}${x.fromRelayMember?` / ${x.relayTeam}`:''} ${rankText(x.rank)}`));return `<div class="student-row"><div class="student-top"><div><div class="student-name">${esc(r.name)}</div><div class="meta">${esc(grade)} / ${esc(r.gender)}</div></div><div>${badge(`最高 ${bestRankLabel}`)}</div></div><div class="student-events">${events.map(e=>`<span class="event-pill">${esc(e)}</span>`).join('')}</div></div>`}
    init();
